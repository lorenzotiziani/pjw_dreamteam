<div class="cm-wrap">

  <!-- Icona -->
  <div class="cm-icon" [ngClass]="'cm-icon--' + type">
    <!-- Danger / elimina -->
    <svg *ngIf="type === 'danger'" width="26" height="26" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6"/><path d="M14 11v6"/>
      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
    </svg>
    <!-- Warning -->
    <svg *ngIf="type === 'warning'" width="26" height="26" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <!-- Primary / info -->
    <svg *ngIf="type === 'primary'" width="26" height="26" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  </div>

  <!-- Testo -->
  <h5 class="cm-title">{{ title }}</h5>
  <p class="cm-message">{{ message }}</p>
  <p class="cm-detail" *ngIf="detail">{{ detail }}</p>

  <!-- Azioni -->
  <div class="cm-actions">
    <button class="cm-btn cm-btn--cancel" (click)="activeModal.dismiss()">
      {{ cancelLabel }}
    </button>
    <button class="cm-btn" [ngClass]="'cm-btn--' + type" (click)="activeModal.close(true)">
      {{ confirmLabel }}
    </button>
  </div>

</div>
