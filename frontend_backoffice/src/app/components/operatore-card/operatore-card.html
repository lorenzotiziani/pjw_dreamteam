<div class="op-card" [class.op-card--inactive]="!operatore.isActive">

  <div class="op-card-avatar" [style.background-color]="avatarColor">
    {{ initials }}
  </div>

  <div class="op-card-body">
    <div class="op-card-name">{{ operatore.cognome }} {{ operatore.nome }}</div>
    <div class="op-card-email">{{ operatore.email }}</div>

    <div class="op-card-badges">
      <span class="op-badge op-badge--role">Operatore</span>
      <span class="op-badge"
            [class.op-badge--active]="operatore.isActive"
            [class.op-badge--inactive]="!operatore.isActive">
        {{ operatore.isActive ? 'Attivo' : 'Disattivo' }}
      </span>
    </div>
  </div>

  <div class="op-card-actions">
    <button class="op-toggle-btn"
            [class.op-toggle-btn--disable]="operatore.isActive"
            [class.op-toggle-btn--enable]="!operatore.isActive"
            (click)="toggle.emit(operatore)">
      <svg *ngIf="operatore.isActive"  width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
      <svg *ngIf="!operatore.isActive" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      {{ operatore.isActive ? 'Disabilita' : 'Abilita' }}
    </button>
  </div>

</div>
