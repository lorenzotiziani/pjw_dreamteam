<div class="toast-container">
  <div
    *ngFor="let t of toasts$ | async"
    class="toast-item"
    [class.toast-item--error]="t.type === 'error'"
    [class.toast-item--success]="t.type === 'success'"
    [class.toast-item--warn]="t.type === 'warn'">

    <!-- Icona -->
    <svg class="toast-icon" width="20" height="20" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <path [attr.d]="iconFor(t.type)"/>
    </svg>

    <!-- Messaggio -->
    <span class="toast-msg">{{ t.message }}</span>

    <!-- Chiudi -->
    <button class="toast-close" (click)="remove(t.id)" aria-label="Chiudi">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

  </div>
</div>
