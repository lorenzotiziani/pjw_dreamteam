<nav class="navbar navbar-expand-md" data-bs-theme="dark">
    <div class="container-fluid">

        <!-- Brand -->
        <a class="navbar-brand" [routerLink]="['/dashboard']">
            <span class="navbar-brand-icon">🚲</span>
            <span class="navbar-brand-text">Bike<span class="navbar-brand-accent">Rent</span></span>
            <span class="navbar-brand-divider"></span>
            <span class="navbar-brand-sub">BackOffice</span>
        </a>

        <!-- Hamburger -->
        <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navContent"
            aria-controls="navContent" aria-expanded="false">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navContent">

            <!-- Nav links per operatori autenticati -->
            <ul class="navbar-nav me-auto gap-1" *ngIf="currentUser$ | async">
                <li class="nav-item">
                    <a class="nav-link" [routerLink]="['/dashboard']" routerLinkActive="active">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" [routerLink]="['/prenotazioni']" routerLinkActive="active">Prenotazioni</a>
                </li>
                <!-- Catalogo dropdown -->
                <li class="nav-item" ngbDropdown>
                    <a class="nav-link" ngbDropdownToggle>Catalogo</a>
                    <div ngbDropdownMenu>
                        <a ngbDropdownItem [routerLink]="['/punti-vendita']">🏪 Punti Vendita</a>
                        <a ngbDropdownItem [routerLink]="['/tipi-bici']">🚲 Tipi di Bicicletta</a>
                        <a ngbDropdownItem [routerLink]="['/accessori']">🎒 Accessori</a>
                        <a ngbDropdownItem [routerLink]="['/coperture']">🛡️ Coperture Assicurative</a>
                    </div>
                </li>
            </ul>

            <!-- Utente / Login -->
            <ul class="navbar-nav ms-auto">
                <app-nav-user
                    *ngIf="(currentUser$ | async) as currentUser; else loginButton"
                    (logout)="logout()"
                    [user]="currentUser">
                </app-nav-user>
                <ng-template #loginButton>
                    <li class="nav-item">
                        <a class="nav-btn-login" [routerLink]="['/login']">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                            </svg>
                            Accedi
                        </a>
                    </li>
                </ng-template>
            </ul>
        </div>
    </div>
</nav>
