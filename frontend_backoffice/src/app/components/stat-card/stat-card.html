<div class="sc-card">
  <div class="sc-icon-wrap" [style.background]="accent + '18'" [style.color]="accent">
    <span [innerHTML]="safeIcon" aria-hidden="true"></span>
  </div>
  <div class="sc-body">
    <div class="sc-label">{{ label }}</div>
    <div class="sc-value" [class.sc-value--compact]="compact" [style.color]="accent">{{ value }}</div>
    <div class="sc-sub" *ngIf="subtitle">{{ subtitle }}</div>
  </div>
</div>
