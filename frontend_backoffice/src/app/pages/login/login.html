<div class="login-wrapper d-flex align-items-center justify-content-center">
    <div class="login-card card shadow-lg border-0">

        <!-- Logo / titolo -->
        <div class="card-body px-5 py-4">
            <div class="text-center mb-4">
                <div class="fs-1 mb-2">&#128666;</div>
                <h4 class="fw-bold mb-0">Login Operatore</h4>
                <p class="text-muted small mb-0">Accedi all'area operatori</p>
            </div>

            <form (ngSubmit)="login()" [formGroup]="loginForm">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" class="form-control form-control-lg"
                        placeholder="operatore@gmail.com"
                        formControlName="username" />
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" class="form-control form-control-lg"
                        placeholder="Enter your password"
                        formControlName="password" />
                </div>

                <!-- Errore credenziali -->
                <div class="alert alert-danger d-flex align-items-center gap-2 py-2" *ngIf="loginError">
                    <span>&#9888;&#65039;</span>
                    <span>{{ loginError }}</span>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 mt-1"
                    [disabled]="loginForm.invalid">
                    Accedi
                </button>
            </form>
        </div>

    </div>
</div>
