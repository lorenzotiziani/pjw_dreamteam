<div class="login-wrapper">
    <div class="login-card">

        <div class="login-avatar">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="40" height="40">
                <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
        </div>

        <div class="login-body">
            <div class="login-header">
                <h4>Login Operatore</h4>
                <p>Accedi all'area di gestione</p>
            </div>

            <form (ngSubmit)="login()" [formGroup]="loginForm">

                <div class="login-field">
                    <label>Email</label>
                    <input type="email" class="login-input"
                        placeholder="operatore@bikerent.it"
                        formControlName="email" />
                </div>

                <div class="login-field">
                    <label>Password</label>
                    <div class="login-input-wrap">
                        <input [type]="showPassword ? 'text' : 'password'" class="login-input"
                            placeholder="Enter your password"
                            formControlName="password" />
                        <button type="button" class="login-eye" (click)="showPassword = !showPassword"
                            [title]="showPassword ? 'Nascondi password' : 'Mostra password'">
                            <!-- occhio aperto -->
                            <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                            <!-- occhio sbarrato -->
                            <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="login-error" *ngIf="loginError">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                        <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/>
                    </svg>
                    <span>{{ loginError }}</span>
                </div>

                <button type="submit" class="login-btn" [disabled]="loginForm.invalid || loading">
                    <span *ngIf="loading" class="login-spinner"></span>
                    {{ loading ? 'Accesso in corso…' : 'Accedi' }}
                </button>
            </form>
        </div>

    </div>
</div>
