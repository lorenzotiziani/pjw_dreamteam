<!-- ===== HEADER ===== -->
<div class="eb-header">
  <div class="eb-header-inner">
    <div class="eb-header-title">
      <span class="eb-header-icon"><i class="bi bi-pencil-square"></i></span>
      <div>
        <h5 class="eb-title">Modifica prenotazione</h5>
        <span class="eb-subtitle">#{{ prenotazioneId }}</span>
      </div>
    </div>
    <button type="button" class="eb-close" (click)="dismiss()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>
</div>

<!-- ===== BODY ===== -->
<div class="modal-body eb-body">

  <!-- Loading -->
  <div *ngIf="isLoading" class="eb-loading">
    <div class="spinner-border" role="status" style="color:#16a34a; width:2rem; height:2rem;">
      <span class="visually-hidden">Caricamento...</span>
    </div>
    <p class="eb-loading-text">Caricamento prenotazione...</p>
  </div>

  <!-- Errore -->
  <div *ngIf="errorMessage" class="eb-error">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}
    <button class="btn btn-sm btn-outline-danger ms-3" (click)="caricaPrenotazione()">
      <i class="bi bi-arrow-clockwise me-1"></i>Riprova
    </button>
  </div>

  <!-- Form -->
  <form [formGroup]="updateForm" *ngIf="!isLoading && !errorMessage">

    <!-- ── Date e orari ── -->
    <div class="eb-section">
      <div class="eb-section-label">
        <i class="bi bi-calendar3 me-2"></i>Date e orari
      </div>
      <div class="eb-grid-2">

        <div class="eb-field">
          <label class="eb-label">
            <i class="bi bi-calendar-event me-1 text-success"></i>Data ritiro
          </label>
          <input type="date" class="eb-input" formControlName="dataRitiro"
                 [class.eb-invalid]="updateForm.get('dataRitiro')?.invalid && updateForm.get('dataRitiro')?.touched">
        </div>

        <div class="eb-field">
          <label class="eb-label">
            <i class="bi bi-clock me-1 text-success"></i>Fascia ritiro
          </label>
          <select class="eb-input" formControlName="oraRitiro"
                  [class.eb-invalid]="updateForm.get('oraRitiro')?.invalid && updateForm.get('oraRitiro')?.touched">
            <option value="">Seleziona orario</option>
            <option *ngFor="let o of orariDisponibili" [value]="o">{{ o }}</option>
          </select>
        </div>

        <div class="eb-field">
          <label class="eb-label">
            <i class="bi bi-calendar-check me-1 text-success"></i>Data riconsegna
          </label>
          <input type="date" class="eb-input" formControlName="dataRiconsegna"
                 [class.eb-invalid]="updateForm.get('dataRiconsegna')?.invalid && updateForm.get('dataRiconsegna')?.touched">
        </div>

        <div class="eb-field">
          <label class="eb-label">
            <i class="bi bi-clock-history me-1 text-success"></i>Fascia riconsegna
          </label>
          <select class="eb-input" formControlName="oraRiconsegna"
                  [class.eb-invalid]="updateForm.get('oraRiconsegna')?.invalid && updateForm.get('oraRiconsegna')?.touched">
            <option value="">Seleziona orario</option>
            <option *ngFor="let o of orariRiconsegna" [value]="o">{{ o }}</option>
          </select>
        </div>

      </div>
    </div>

    <!-- ── Copertura ── -->
    <div class="eb-section">
      <div class="eb-section-label">
        <i class="bi bi-shield-check me-2"></i>Copertura assicurativa
      </div>
      <div class="eb-coperture-grid">

        <label *ngFor="let cop of coperture$ | async"
               class="eb-cop-card"
               [class.eb-cop-selected]="updateForm.get('coperturaId')?.value == cop.id">
          <input type="radio" formControlName="coperturaId" [value]="cop.id" class="visually-hidden">
          <i class="bi bi-shield-fill-check eb-cop-icon eb-cop-icon-green"></i>
          <span class="eb-cop-nome">{{ cop.nome }}</span>
          <span class="eb-cop-prezzo">+{{ cop.prezzo | currency }}</span>
        </label>

      </div>
    </div>

    <!-- ── Accessori ── -->
    <div class="eb-section">
      <div class="eb-section-label">
        <i class="bi bi-bag-check me-2"></i>Accessori
      </div>
      <div *ngIf="listaAccessori.length === 0" class="eb-empty-text">
        <i class="bi bi-info-circle me-1"></i>Nessun accessorio disponibile.
      </div>
      <div *ngIf="listaAccessori.length > 0 && accessoriArray.length > 0" class="eb-acc-grid">
        <label *ngFor="let acc of listaAccessori; let i = index"
               class="eb-acc-chip"
               [class.eb-acc-selected]="getAccessorioControl(i).value">
          <input type="checkbox" [formControl]="getAccessorioControl(i)"
                 [id]="'acc-' + i" class="visually-hidden">
          <i class="bi" [ngClass]="getAccessorioControl(i).value ? 'bi-check-circle-fill' : 'bi-circle'"></i>
          <span>{{ acc.nome }}</span>
          <span class="eb-acc-price">+{{ acc.prezzo | currency }}</span>
        </label>
      </div>
    </div>

  </form>
</div>

<!-- ===== FOOTER ===== -->
<ng-container *ngIf="!isLoading && !errorMessage">
  <div class="eb-footer">
    <div class="eb-totale">
      <span class="eb-totale-label">Totale stimato</span>
      <span class="eb-totale-value">{{ getTotale() | currency }}</span>
    </div>
    <div class="eb-footer-actions">
      <button type="button" class="eb-btn-cancel" (click)="dismiss()">
        <i class="bi bi-x me-1"></i>Annulla
      </button>
      <button type="button" class="eb-btn-save" (click)="confermaModifica()">
        <i class="bi bi-check-lg me-1"></i>Salva modifiche
      </button>
    </div>
  </div>
</ng-container>
