
<div class="p-3">
  <div class="modal-header">
    <h2 class="modal-title">Modifica prenotazione</h2>
    <button type="button" class="btn-close" (click)="dismissModal()"></button>
  </div>

  <form [formGroup]="sessionForm">

    <div class="mb-4">
      <label class="form-label">Title:</label>
      <input type="text" class="form-control" formControlName="title" required/>
    </div>

    <div class="mb-4">
      <label class="form-label">Starts at:</label>
      <input type="date" class="form-control" formControlName="startsAt"
      />
    </div>

    <div class="mb-4">
      <label class="form-label">Duration minutes:</label>
      <input type="number" class="form-control" min="10" formControlName="durationMinutes" />
    </div>

    <div class="mb-4">
      <label class="form-label">Max participants:</label>
      <input type="number" class="form-control" min="5" formControlName="maxParticipants" />
    </div>

    <div class="d-grid">
      <button 
        type="button" 
        class="btn btn-primary" 
        (click)="closeModal()"
        [disabled]="!sessionForm.valid"
      >Add</button>
    </div>
  </form>
</div>
