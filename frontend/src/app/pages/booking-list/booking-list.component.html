<div class="dr-list-page">

  <!-- Page hero header -->
  <div class="dr-list-header">
    <div class="container">
      <div class="d-flex align-items-center gap-3">
        <span class="dr-list-header-icon"><i class="bi bi-list-check"></i></span>
        <div>
          <h2 class="fw-bold mb-0 text-white">Le mie prenotazioni</h2>
          <p class="mb-0 text-white opacity-75 small">Visualizza e gestisci le tue prenotazioni DreamRide</p>
        </div>
      </div>
    </div>
  </div>

  <div class="container py-4 py-md-5">

    <!-- Errore -->
    <div *ngIf="error" class="alert alert-danger d-flex align-items-center rounded-3 mb-4">
      <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
    </div>

    <!-- Loading spinner -->
    <div *ngIf="loading" class="dr-loading-state">
      <div class="spinner-border text-success" role="status" style="width: 2.5rem; height: 2.5rem;">
        <span class="visually-hidden">Caricamento...</span>
      </div>
      <p class="mt-3 text-muted">Caricamento prenotazioni in corso...</p>
    </div>

    <!-- Stato vuoto -->
    <div *ngIf="!loading && prenotazioni.length === 0 && !error" class="dr-empty-state">
      <div class="dr-empty-icon"><i class="bi bi-calendar-x"></i></div>
      <h5 class="fw-bold mt-3 mb-1">Nessuna prenotazione</h5>
      <p class="text-muted small mb-4">Non hai ancora effettuato nessuna prenotazione.</p>
      <a routerLink="/booking/form" class="btn dr-btn-green px-4 py-2">
        <i class="bi bi-calendar2-plus me-2"></i>Prenota ora
      </a>
    </div>

    <!-- Lista prenotazioni -->
    <div *ngIf="!loading && prenotazioni.length > 0" class="row g-4">
      <div class="col-md-6 col-lg-4" *ngFor="let p of prenotazioni">
        <app-card-bike
          [prenotazione]="p"
          (cancella)="cancellaPrenotazione($event)"
          (modifica)="openModal($event)">
        </app-card-bike>
      </div>

      <!-- Pulsante nuova prenotazione -->
      <div class="col-12 text-center mt-2">
        <a routerLink="/booking/form" class="btn btn-outline-success px-4">
          <i class="bi bi-plus-circle me-2"></i>Nuova prenotazione
        </a>
      </div>
    </div>

  </div>
</div>
