<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-semibold">
      <i class="bi bi-calendar-check me-2"></i>Le mie prenotazioni
    </h2>
  </div>

  <div *ngIf="error" class="alert alert-danger d-flex align-items-center">
    <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
  </div>

  <div *ngIf="!loading && prenotazioni.length === 0" class="alert alert-info text-center py-5">
    <i class="bi bi-emoji-frown fs-1 d-block mb-3"></i>
    <p class="mb-0">Non hai ancora effettuato nessuna prenotazione.</p>
    <button class="btn btn-primary mt-3" routerLink="/booking/form">Prenota ora</button>
  </div>

  <div *ngIf="!loading && prenotazioni.length> 0" class="row g-4">
    <div class="col-md-6 col-lg-4" *ngFor="let p of prenotazioni">
      <app-card-bike
        [prenotazione]="p"
        (cancella)="cancellaPrenotazione($event)"
        (modifica)="openModal($event)">
      </app-card-bike>
    </div>
  </div>
</div>
