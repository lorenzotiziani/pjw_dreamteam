<div class="m-5 p-3 border border-dark rounded">
  <div class="modal-header">
    <h2 class="modal-title">Noleggio bici</h2>
  </div>

  <div>
    <form [formGroup]="bookingForm" (ngSubmit)="addPrenotazione()">

      <div class="m-4">
        <label>*Data ritiro:</label>
        <input type="date" class="form-control" formControlName="data" />
      </div>

      <div class="m-4">
        <label for="puntoVendita">Scegli un punto vendita:</label>
        <select class="form-control" formControlName="puntoVendita">
          <option value="" disabled selected>Seleziona un punto vendita</option>
          <option *ngFor="let p of puntoVendita$ | async" [value]="p.id">
            {{ p.nome }} - {{ p.citta }}, {{ p.indirizzo }}
          </option>
        </select>
      </div>

      <div class="m-4">
        <label class="form-label" for="fascia-oraria">Scegli un orario per il ritiro:</label>
        <select class="form-control" name="fascia-oraria" id="fascia-oraria" formControlName="ora">
          <option class="form-control" value="" disabled selected>Seleziona un orario</option>
          <option *ngFor="let orario of orariDisponibili" [value]="orario">
            {{ orario }}
          </option>
        </select>
      </div>
      
      <div class="m-4">
        <label class="form-label" for="fascia-oraria-riconsegna">Scegli un orario per la riconsegna:</label>
        <select class="form-control" name="fascia-oraria-riconsegna" id="fascia-oraria-riconsegna" formControlName="oraRiconsegna">
          <option class="form-control" value="" disabled selected>Seleziona un orario</option>
          <option *ngFor="let orario of orariDisponibili" [value]="orario">
            {{ orario }}
          </option>
        </select>
      </div>

      <div class="m-4">
        <label for="TipologiaBicicletta">Scegli una bici:</label>
        <select class="form-control" formControlName="tipoBiciId">
          <option value="" disabled selected>Seleziona una bici</option>
          <option *ngFor="let bike of bikesDisponibili$ | async" [value]="bike.id">
            {{ bike.categoria }} - {{ bike.taglia }} - {{ bike.motorizzazione }}
          </option>
        </select>
      </div>

      <div class="m-4">
        <label class="form-label">Scegli gli accessori:</label>
        <div class="row">
          <div class="col-md-6" *ngFor="let accessorio of accessori$ | async">
            <div class="form-check border p-3 rounded m-2">
              <input class="form-check-input" type="checkbox" [id]="accessorio.id" [value]="accessorio.id"
              (change)="onAccessorioChange($event, accessorio)">
              <label class="form-check-label" [for]="accessorio.id">
                <strong>{{ accessorio.nome }}</strong>
                <span class="badge bg-primary ms-2">€{{ accessorio.prezzo }}</span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <div class="m-4">
        <label class="form-label">Scegli una copertura aggiuntiva (solo una):</label>
        <div class="row">
          <div class="col-md-6" *ngFor="let copertura of coperture$ | async">
            <div class="form-check border p-3 rounded m-2">
              <input class="form-check-input" 
                    type="radio"
                    name="coperturaUnica"
                    [id]="copertura.id" 
                    [value]="copertura.id"
                    (change)="onCoperturaSelezionata(copertura)">
              <label class="form-check-label" [for]="copertura.id">
                <strong>{{ copertura.nome }}</strong>
                <span class="badge bg-primary ms-2">€{{ copertura.prezzo }}</span>
                <p class="mb-0 mt-2 text-muted small">{{ copertura.descrizione }}</p>
              </label>
            </div>
          </div>
        </div>
      </div>

      <ng-container *ngIf="user$ | async as user; else noAuth">
        <div class="d-grid">
          <button type="submit" class="btn btn-primary" [disabled]="!bookingForm.valid">
            Add
          </button>
        </div>
      </ng-container>

      <ng-template #noAuth>
        <div class="d-flex justify-content-center align-items-center">
          <div class="text-center">
            <p class="mb-3">Effettua il login prima di confermare la prenotazione</p>
            <button class="btn btn-primary" (click)="login()">
              Login
            </button>
          </div>
        </div>
      </ng-template>

      <div class="m-4">
        <strong>Totale: €{{ prezzoTotale }}</strong>
      </div>
    </form>
  </div>
</div>
