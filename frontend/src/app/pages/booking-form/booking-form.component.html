<div class="m-5 p-3 border border-dark rounded">
  <div class="modal-header">
    <h2 class="modal-title">Noleggio bici</h2>
  </div>

  <div>
    <form [formGroup]="bookingForm">

      <div class="mb-4">
        <label class="form-label">*Data ritiro:</label>
        <input type="date" class="form-control" formControlName="data" />
      </div>

      <div class="m-4">
        <label class="form-label" for="puntoVendita">Scegli un punto vendita:</label>
        <select class="form-control m-2" name="puntoVendita" id="puntoVendita" formControlName="puntoVendita">
          <option class="form-control" value="" disabled selected>Seleziona un punto vendita</option>
          <option *ngFor="let puntoV of puntiVendita" [value]="puntoV">
            {{ puntoV.nome }}
          </option>
        </select>
      </div>
      
      <div class="m-4">
        <label class="form-label" for="fascia-oraria">Scegli un orario:</label>
        <select class="form-control m-2" name="fascia-oraria" id="fascia-oraria" formControlName="ora">
          <option class="form-control" value="" disabled selected>Seleziona un orario</option>
          <option *ngFor="let orario of orariDisponibili" [value]="orario">
            {{ orario }}
          </option>
        </select>
      </div>

      <div class="m-4">
        <label class="form-label" for="TipologiaBicicletta">Scegli una bici:</label>
        <select class="form-control m-2" name="TipologiaBicicletta" id="TipologiaBicicletta" formControlName="tipologiaBicicletta">
          <option value="" disabled selected>Seleziona una bici</option>
          <option *ngFor="let type of types" [value]="type">
            {{ type }}
          </option>
        </select>
      </div>

      <div class="m-4">
        <label class="form-label" for="DimensioneBicicletta">Scegli la taglia:</label>
        <select class="form-control m-2"name="DimensioneBicicletta" id="DimensioneBicicletta" formControlName="dimensioneBicicletta">
          <option class="form-control" value="" disabled selected>Seleziona la taglia</option>
          <option *ngFor="let size of sizes" [value]="size">
            {{ size }}
          </option>
        </select>
      </div>

      <div class="row">
        <div class="m-4">
          <label class="form-label mb-3">Scegli le coperture aggiuntive:</label>
          <div class="row">
            <div class="col-md-6" *ngFor="let copertura of coperture">
              <div class="form-check m-2 border p-3 rounded">
                <input 
                  class="form-check-input" 
                  type="checkbox" 
                  [id]="copertura.id"
                  [value]="copertura.id"
                  formControlName="coperture"
                >
                <label class="form-check-label" [for]="copertura.id">
                  <strong>{{ copertura.nome }}</strong>
                  <span class="badge bg-primary ms-2">€{{ copertura.prezzo }}</span>
                  <p class="mb-0 mt-2 text-muted small">{{ copertura.descrizione }}</p>
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <ng-container *ifAuthenticated>
        <div class="d-grid">
          <button 
            type="button" 
            class="btn btn-primary" 
            [disabled]="!bookingForm.valid"
          >Add</button>
        </div>
      </ng-container>

    <ng-container *ifAuthenticated="false">
      Effettua il login per completare il noleggio!
    </ng-container>
      
    </form>
  </div>
</div>
